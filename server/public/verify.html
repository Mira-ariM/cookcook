<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>CookCook 验收</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,sans-serif;background:#FFF8F0;color:#333;max-width:420px;margin:0 auto;padding:20px}
h1{text-align:center;font-size:24px;margin:20px 0 8px}
.sub{text-align:center;color:#999;font-size:14px;margin-bottom:24px}
.card{background:#fff;border-radius:16px;padding:20px;margin-bottom:16px;box-shadow:0 2px 12px rgba(0,0,0,.06)}
.card h2{font-size:16px;margin-bottom:12px}
label{display:block;font-size:14px;margin:8px 0 4px;color:#666}
input,select{width:100%;padding:10px 12px;border:1px solid #eee;border-radius:10px;font-size:15px;margin-bottom:8px;background:#fafafa}
.step-row{display:flex;gap:8px;align-items:center}
.step-row span{white-space:nowrap;font-size:14px;color:#666}
.step-row input{width:50px;text-align:center}
.btn{display:block;width:100%;padding:14px;border:none;border-radius:14px;font-size:17px;font-weight:600;cursor:pointer;margin-top:12px}
.btn-primary{background:#FF6B6B;color:#fff}
.btn-primary:disabled{background:#ccc}
.btn-outline{background:#fff;color:#FF6B6B;border:2px solid #FF6B6B}
.result{margin-top:12px;font-size:14px}
.plan-card{background:#FFF8F0;border-radius:12px;padding:16px;margin-bottom:12px;border:1px solid #ffe0e0}
.plan-card h3{font-size:16px;color:#FF6B6B;margin-bottom:8px}
.plan-card .dish{font-size:14px;padding:4px 0}
.plan-card .meta{font-size:12px;color:#999;margin-top:8px}
.plan-card .rationale{font-size:12px;color:#888;margin-top:4px;line-height:1.5}
.error{color:#FF6B6B;font-size:14px;padding:8px;background:#fff0f0;border-radius:8px}
.loading{text-align:center;padding:20px;color:#999}
.dish-row{display:flex;align-items:center;justify-content:space-between;padding:4px 0}
.btn-sm{background:#fff;border:1px solid #FF6B6B;color:#FF6B6B;border-radius:8px;padding:4px 10px;font-size:13px;cursor:pointer}
.btn-sm:active{background:#fff0f0}
.step-indicator{display:flex;justify-content:center;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.step-dot{width:12px;height:12px;border-radius:50%;background:#eee}
.step-dot.active{background:#FF6B6B}
.step-dot.done{background:#4CAF50}
.alt-list{max-height:200px;overflow-y:auto;margin:8px 0}
.alt-item{padding:10px 12px;border-bottom:1px solid #eee;cursor:pointer;display:flex;justify-content:space-between;align-items:center}
.alt-item:hover{background:#FFF0F0}
.alt-item .time{font-size:12px;color:#999}
.back-link{text-align:center;margin-top:12px}
.back-link a{color:#FF6B6B;text-decoration:none;font-size:14px}
.shopping-item{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid #f5f5f5}
.shopping-item input[type=checkbox]{width:20px;height:20px}
.shopping-item.done{color:#999;text-decoration:line-through}
.shopping-section{margin-bottom:16px}
.shopping-section h3{font-size:14px;color:#FF6B6B;margin-bottom:8px}
.cooking-dish{margin-bottom:16px}
.cooking-dish h3{font-size:14px;color:#FF6B6B;margin-bottom:4px}
.step-item{display:flex;align-items:flex-start;gap:8px;padding:6px 0;border-bottom:1px solid #f9f9f9}
.step-item.done{opacity:.5}
.step-item input[type=checkbox]{margin-top:3px}
.step-item .step-text{flex:1;font-size:14px}
.step-item .step-meta{font-size:11px;color:#999;margin-top:2px}
.tag-row{display:flex;flex-wrap:wrap;gap:8px;margin:8px 0}
.tag{padding:6px 14px;border-radius:20px;background:#f5f5f5;font-size:13px;cursor:pointer;border:1px solid #eee}
.tag.active{background:#FF6B6B;color:#fff;border-color:#FF6B6B}
.rating-row{display:flex;gap:8px;margin:8px 0}
.rating-btn{flex:1;text-align:center;padding:10px;border-radius:12px;background:#f5f5f5;font-size:14px;cursor:pointer}
.rating-btn.active{background:#FF6B6B;color:#fff}
textarea{width:100%;padding:10px;border-radius:10px;border:1px solid #eee;font-size:14px;margin:8px 0;resize:none}
</style>
</head>
<body>
<h1>🍳 CookCook</h1>
<p class="sub">情侣搭饭 · 验收版</p>

<div class="step-indicator">
  <div class="step-dot active" id="dot1"></div><div class="step-dot" id="dot2"></div>
  <div class="step-dot" id="dot3"></div><div class="step-dot" id="dot4"></div>
  <div class="step-dot" id="dot5"></div><div class="step-dot" id="dot6"></div>
</div>

<!-- Step 1: Scenario -->
<div class="card" id="step1">
  <h2>Step 1: 选场景 & 口味</h2>
  <label>场景</label>
  <select id="scenario"><option value="random">🎲 随机搭配一顿饭</option><option value="fridge">🧊 冰箱食材</option><option value="leftovers">🍱 剩菜改造</option></select>
  <label>饭菜结构</label>
  <div class="step-row"><span>荤</span><input type="number" id="meat" value="1" min="0" max="5"><span>素</span><input type="number" id="veg" value="1" min="0" max="5"><span>汤</span><input type="number" id="soup" value="1" min="0" max="5"></div>
  <label>我今天想吃（逗号分隔）</label>
  <input type="text" id="selfFlavor" value="酸辣,下饭" placeholder="如: 酸辣,下饭">
  <label>对方想吃</label>
  <input type="text" id="partnerFlavor" value="清淡,想喝汤" placeholder="如: 清淡,想喝汤">
  <label>时间限制（分钟，可选）</label>
  <input type="number" id="timeBudget" value="60" min="10" max="180">
  <button class="btn btn-primary" onclick="step1Generate()">🍳 生成整餐方案</button>
  <div id="step1Result" class="result"></div>
</div>

<!-- Step 2: Plans -->
<div class="card" id="step2" style="display:none">
  <h2>Step 2: 选择方案</h2>
  <div id="plansContainer"></div>
  <div id="step2Result" class="result"></div>
</div>

<!-- Step 3: Confirm -->
<div class="card" id="step3" style="display:none">
  <h2>Step 3: 确认</h2>
  <div id="confirmInfo"></div>
  <div id="step3Result" class="result"></div>
  <p class="back-link"><a href="javascript:setStep(2)">🔙 返回方案列表</a></p>
</div>

<!-- Step 4: Shopping List -->
<div class="card" id="step4" style="display:none">
  <h2>🛒 Step 4: 购物清单</h2>
  <div id="shoppingContainer"></div>
  <button class="btn btn-primary" onclick="goShopping()">加载购物清单</button>
  <button class="btn btn-primary" style="background:#4CAF50;display:none" id="goCookBtn" onclick="goCooking()">🔪 买好了，开始做饭</button>
</div>

<!-- Step 5: Cooking -->
<div class="card" id="step5" style="display:none">
  <h2>🍳 Step 5: 做饭模式</h2>
  <div id="cookingContainer"></div>
  <button class="btn btn-primary" style="background:#4CAF50;display:none" id="finishCookBtn" onclick="goFeedback()">🎉 全部完成，去评价</button>
</div>

<!-- Step 6: Feedback -->
<div class="card" id="step6" style="display:none">
  <h2>💬 Step 6: 饭后反馈</h2>
  <div id="feedbackContainerA"></div>
  <div id="feedbackContainerB"></div>
  <textarea id="feedbackNote" placeholder="一句话备注（可选）..." rows="2"></textarea>
  <button class="btn btn-primary" onclick="submitFeedback()">💾 提交反馈</button>
  <div id="step6Result" class="result"></div>
</div>

<script>
const API='/api';
let profileId=null,currentPlans=[],selectedPlan=null;
const STEPS=['step1','step2','step3','step4','step5','step6'];
const DOTS=['dot1','dot2','dot3','dot4','dot5','dot6'];

function setStep(n){
  STEPS.forEach((s,i)=>document.getElementById(s).style.display=i+1===n?'block':'none');
  DOTS.forEach((d,i)=>{const el=document.getElementById(d);el.className='step-dot'+(i+1===n?' active':i+1<n?' done':'');});
}

async function step1Generate(){
  const btn=document.querySelector('#step1 .btn');btn.disabled=true;btn.textContent='生成中...';
  document.getElementById('step1Result').innerHTML='<div class="loading">正在调用推荐引擎...</div>';
  try{
    if(!profileId){const pr=await fetch(API+'/profiles',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({partnerA:{name:'我',role:'self',likedFlavors:[],dislikedFlavors:[],allergies:[],dietaryRestrictions:[],recentAversions:[],cookingSkill:2,cookingPatience:2,isPrimaryCook:true},partnerB:{name:'对方',role:'partner',likedFlavors:[],dislikedFlavors:[],allergies:[],dietaryRestrictions:[],recentAversions:[],cookingSkill:2,cookingPatience:2,isPrimaryCook:false}})});const pj=await pr.json();if(!pj.success)throw new Error(pj.error);profileId=pj.data.id;}
    const sf=document.getElementById('selfFlavor').value.split(/[,，]/).map(s=>s.trim()).filter(Boolean);
    const pf=document.getElementById('partnerFlavor').value.split(/[,，]/).map(s=>s.trim()).filter(Boolean);
    const gr=await fetch(API+'/meal-plans/generate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({scenario:document.getElementById('scenario').value,mealStructure:{meat:+document.getElementById('meat').value,veg:+document.getElementById('veg').value,soup:+document.getElementById('soup').value},timeBudgetMinutes:+document.getElementById('timeBudget').value||undefined,todayFlavors:{self:sf,partner:pf},coupleProfileId:profileId})});
    const gj=await gr.json();if(!gj.success)throw new Error(gj.error||'生成失败');
    currentPlans=gj.data.plans;
    document.getElementById('step1Result').innerHTML=currentPlans.length?'<div style="color:#4CAF50">✅ 生成了 '+currentPlans.length+' 套方案</div>':'<div class="error">没有匹配的方案</div>';
    if(currentPlans.length){renderPlans();setStep(2);}
  }catch(e){document.getElementById('step1Result').innerHTML='<div class="error">'+e.message+'</div>';}
  finally{btn.disabled=false;btn.textContent='🍳 生成整餐方案';}
}

function renderPlans(){
  document.getElementById('plansContainer').innerHTML=currentPlans.map((p,i)=>`<div class="plan-card" id="plan-${i}"><h3>方案 ${'ABC'[i]}</h3>${p.dishes.map((d,j)=>`<div class="dish-row"><span class="dish">${d.role}：<strong>${d.recipeSnapshot.name}</strong></span><button class="btn-sm" onclick="startSwap(${i},${j})">换一道</button></div>`).join('')}<div class="alt-list" id="alts-${i}" style="display:none"></div><div class="meta">⏱ 约${p.totalTimeMinutes}分钟 · 难度${'⭐'.repeat(p.difficulty)}</div><div class="rationale">${p.rationale}</div><button class="btn btn-primary" style="background:#4CAF50;margin-top:8px" onclick="confirmPlan(${i})">OK！就吃这个！</button></div>`).join('');
}

async function startSwap(pi,di){const plan=currentPlans[pi],dish=plan.dishes[di],c=document.getElementById('alts-'+pi);c.style.display='block';c.innerHTML='<div class="loading">查找替代菜...</div>';try{const r=await fetch(API+'/recipes?type='+encodeURIComponent(dish.role)+'&limit=30');const j=await r.json();const alts=(j.data||[]).filter(rec=>rec.id!==dish.recipeId);c.innerHTML=alts.length?alts.map(a=>`<div class="alt-item" onclick="doSwap(${pi},${di},'${a.id}')"><span><strong>${a.name}</strong><br><span class="time">${a.total_time_minutes||'?'}分钟 · 难度${'⭐'.repeat(a.difficulty||1)}</span></span><span style="color:#FF6B6B;font-size:14px">👉 换这个</span></div>`).join(''):'<div style="color:#999;padding:12px">没有同类型替代菜可选</div>';}catch(e){c.innerHTML='<div class="error">'+e.message+'</div>';}}
async function doSwap(pi,di,nid){const plan=currentPlans[pi],c=document.getElementById('alts-'+pi);c.innerHTML='<div class="loading">替换中...</div>';try{const r=await fetch(API+'/meal-plans/'+plan.id+'/replace-dish',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({dishIndex:di,newRecipeId:nid})});const j=await r.json();if(!j.success)throw new Error(j.error||'替换失败');currentPlans[pi]=j.data;renderPlans();c.style.display='none';document.getElementById('step2Result').innerHTML='<div style="color:#4CAF50;font-size:14px">✅ 替换成功！方案已更新</div>';}catch(e){c.innerHTML='<div class="error">'+e.message+'</div>';}}

async function confirmPlan(pi){
  selectedPlan=currentPlans[pi];const r=document.getElementById('step3Result');
  document.getElementById('confirmInfo').innerHTML=`<div class="plan-card"><h3>确认方案 ${'ABC'[pi]}</h3>${selectedPlan.dishes.map(d=>`<div class="dish">${d.role}：<strong>${d.recipeSnapshot.name}</strong></div>`).join('')}<div class="meta">⏱ 约${selectedPlan.totalTimeMinutes}分钟</div></div>`;
  setStep(3);r.innerHTML='<div class="loading">确认中...</div>';
  try{
    const cr=await fetch(API+'/meal-plans/'+selectedPlan.id+'/confirm',{method:'PATCH'});
    const cj=await cr.json();if(!cj.success)throw new Error(cj.error||'确认失败');
    r.innerHTML='<div style="color:#4CAF50;font-size:16px;text-align:center;padding:10px">✅ 方案已确认！<br><button class="btn btn-primary" style="margin-top:12px" onclick="setStep(4);goShopping()">👉 下一步：购物清单</button></div>';
  }catch(e){r.innerHTML='<div class="error">'+e.message+'</div>';}
}

// ═══ Step 4: Shopping List ═══
async function goShopping(){
  const c=document.getElementById('shoppingContainer');c.innerHTML='<div class="loading">加载购物清单...</div>';
  try{
    const r=await fetch(API+'/meal-plans/'+selectedPlan.id);const j=await r.json();
    if(!j.success)throw new Error(j.error);
    selectedPlan=j.data; // refresh with latest shopping list
    const sl=selectedPlan.shoppingList||{alreadyHave:[],needToBuy:[],optional:[]};
    let html='';
    if(sl.needToBuy&&sl.needToBuy.length){
      html+='<div class="shopping-section"><h3>🛒 需要购买</h3>';
      sl.needToBuy.forEach((it,i)=>html+=`<div class="shopping-item"><input type="checkbox" id="buy-${i}" ${it.checked?'checked':''} onchange="checkItem('needToBuy',${i},this.checked)"><span>${it.name} — ${it.amount} <small style="color:#999">(${it.fromRecipe})</small></span></div>`);
      html+='</div>';
    }
    if(sl.alreadyHave&&sl.alreadyHave.length){
      html+='<div class="shopping-section"><h3>✅ 家里已有</h3>';
      sl.alreadyHave.forEach(it=>html+=`<div class="shopping-item done"><span>${it.name} — ${it.amount}</span></div>`);
      html+='</div>';
    }
    if(sl.optional&&sl.optional.length){
      html+='<div class="shopping-section"><h3>✨ 可选</h3>';
      sl.optional.forEach(it=>html+=`<div class="shopping-item"><span>${it.name} — ${it.amount}</span></div>`);
      html+='</div>';
    }
    c.innerHTML=html;
    document.getElementById('goCookBtn').style.display='block';
  }catch(e){c.innerHTML='<div class="error">'+e.message+'</div>';}
}
async function checkItem(section,idx,checked){
  const items=[{name:selectedPlan.shoppingList[section][idx].name,checked}];
  await fetch(API+'/meal-plans/'+selectedPlan.id+'/shopping-list',{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({items})});
}

// ═══ Step 5: Cooking ═══
let cookState={completed:[],current:0};
function goCooking(){setStep(5);renderCooking();}
function renderCooking(){
  const allSteps=[];selectedPlan.dishes.forEach(d=>{d.recipeSnapshot.steps.forEach(s=>allSteps.push({...s,dishName:d.recipeSnapshot.name,role:d.role}));});
  // Group by dish
  let html='<div class="meta" style="margin-bottom:12px">已完成 '+cookState.completed.length+'/'+allSteps.length+' 步</div>';
  let stepIdx=0;
  selectedPlan.dishes.forEach(d=>{
    html+=`<div class="cooking-dish"><h3>${d.role}：${d.recipeSnapshot.name}</h3>`;
    d.recipeSnapshot.steps.forEach(s=>{
      const done=cookState.completed.includes(stepIdx);
      html+=`<div class="step-item ${done?'done':''}"><input type="checkbox" ${done?'checked':''} onchange="toggleStep(${stepIdx})"><div class="step-text">${s.order}. ${s.description}<div class="step-meta">${s.durationMinutes?'⏱'+s.durationMinutes+'分钟 ':''}${s.fireHint?'🔥'+s.fireHint+' ':''}${s.warning?'⚠️'+s.warning:''}</div></div></div>`;
      stepIdx++;
    });
    html+='</div>';
  });
  document.getElementById('cookingContainer').innerHTML=html;
  document.getElementById('finishCookBtn').style.display=cookState.completed.length===allSteps.length?'block':'none';
}
async function toggleStep(idx){
  if(cookState.completed.includes(idx))cookState.completed=cookState.completed.filter(s=>s!==idx);
  else cookState.completed.push(idx);
  cookState.current=idx+1;
  await fetch(API+'/meal-plans/'+selectedPlan.id+'/cooking-progress',{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({currentStep:cookState.current,completedSteps:cookState.completed})});
  renderCooking();
}

// ═══ Step 6: Feedback ═══
function goFeedback(){
  setStep(6);
  const tags=['下次还想吃','太辣','太淡','太油','太麻烦','适合工作日','适合周末','对方很喜欢'];
  const ratings=[{k:'delicious',l:'😋 好吃'},{k:'okay',l:'😐 一般'},{k:'never_again',l:'🙅 不想再吃'}];
  const makePerson=(prefix,label)=>{
    let h=`<h3>${label}</h3><div class="rating-row">`;
    ratings.forEach(r=>h+=`<div class="rating-btn" id="${prefix}-rate-${r.k}" onclick="setRating('${prefix}','${r.k}')">${r.l}</div>`);
    h+='</div><div class="tag-row">';
    tags.forEach(t=>h+=`<div class="tag" id="${prefix}-tag-${t}" onclick="toggleTag('${prefix}','${t}')">${t}</div>`);
    h+='</div>';
    return h;
  };
  document.getElementById('feedbackContainerA').innerHTML=makePerson('a','我的评价');
  document.getElementById('feedbackContainerB').innerHTML=makePerson('b','对方的评价');
  setRating('a','delicious');setRating('b','delicious');
  window.feedbackState={a:{overall:'delicious',tags:[]},b:{overall:'delicious',tags:[]}};
}
function setRating(who,val){
  ['delicious','okay','never_again'].forEach(k=>document.getElementById(who+'-rate-'+k).className='rating-btn'+(k===val?' active':''));
  window.feedbackState[who].overall=val;
}
function toggleTag(who,tag){
  const el=document.getElementById(who+'-tag-'+tag);const tags=window.feedbackState[who].tags;
  if(tags.includes(tag)){tags.splice(tags.indexOf(tag),1);el.className='tag';}else{tags.push(tag);el.className='tag active';}
}

async function submitFeedback(){
  const btn=document.querySelector('#step6 .btn');btn.disabled=true;btn.textContent='提交中...';
  const r=document.getElementById('step6Result');const fs=window.feedbackState;
  try{
    const cr=await fetch(API+'/meal-plans/'+selectedPlan.id+'/feedback',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
      feedbackA:{overall:fs.a.overall,tags:fs.a.tags,wouldRepeat:fs.a.tags.includes('下次还想吃')},
      feedbackB:{overall:fs.b.overall,tags:fs.b.tags,wouldRepeat:fs.b.tags.includes('下次还想吃')},
      dishFeedbacks:selectedPlan.dishes.map(d=>({recipeId:d.recipeId,overall:fs.a.overall,tags:fs.a.tags,wouldRepeat:fs.a.tags.includes('下次还想吃')})),
      note:document.getElementById('feedbackNote').value,photoUrl:undefined
    })});
    const j=await cr.json();if(!j.success)throw new Error(j.error||'提交失败');
    r.innerHTML='<div style="color:#4CAF50;font-size:20px;text-align:center;padding:20px">🎉 全链路验收通过！<br><small>选场景→生成→确认→购物→做饭→反馈，全部跑通 ✅</small></div>';
  }catch(e){r.innerHTML='<div class="error">'+e.message+'</div>';}
  finally{btn.disabled=false;btn.textContent='💾 提交反馈';}
}
</script>
</body>
</html>
